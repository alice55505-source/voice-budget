<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Microphone (white, upper-left) -->
  <rect x="24" y="8" width="26" height="40" rx="13" fill="white"/>
  <path d="M11 42 Q11 63 37 63 Q63 63 63 42"
        fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="37" y1="63" x2="37" y2="74" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="26" y1="74" x2="48" y2="74" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Gold coin (lower-right, slightly larger) -->
  <circle cx="71" cy="71" r="26" fill="#92400e" opacity="0.4"/>
  <circle cx="71" cy="71" r="24" fill="url(#coin)"/>
  <circle cx="71" cy="71" r="19" fill="none" stroke="#fef3c7" stroke-width="1.5" opacity="0.6"/>
  <text x="71" y="80.5" text-anchor="middle" font-size="27" font-weight="900"
        fill="#451a03" font-family="Arial Black,Arial,sans-serif">$</text>
</svg>
